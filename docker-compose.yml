services:
  garmin-mcp:
    build: .
    container_name: garmin-mcp-server
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    ports:
      - "8000:8000"
    volumes:
      - ~/.garminconnect:/root/.garminconnect:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8000)); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
